<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinky Parfum Shop</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ffe4ec;
}

/* NAVBAR */
.navbar {
    background: #ff4da6;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    color: white;
}

.navbar input {
    width: 50%;
    padding: 8px;
    border-radius: 20px;
    border: none;
}

/* BANNER */
.banner img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    animation: fade 5s infinite;
}

@keyframes fade {
    0%{opacity:1}
    50%{opacity:0.7}
    100%{opacity:1}
}

/* PRODUK */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 10px;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 8px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.price {
    color: #ff3385;
    font-weight: bold;
}

button {
    width: 100%;
    background: #ff4da6;
    border: none;
    color: white;
    padding: 6px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <by Eca Shop🛍</b>
    <input type="text" placeholder="Cari parfum...">
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
</div>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224fbe4">
<p>Chanel Perfume</p>
<p class="price">Rp 250.000</p>
<button onclick="addCart('Chanel Perfume')">+ Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de">
<p>Dior Perfume</p>
<p class="price">Rp 300.000</p>
<button onclick="addCart('Dior Perfume')">+ Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1594035910387-fea47794261f">
<p>Gucci Perfume</p>
<p class="price">Rp 280.000</p>
<button onclick="addCart('Gucci Perfume')">+ Keranjang</button>
</div>

</div>

<br>
<div style="padding:10px;">
<button onclick="goCheckout()">🛒 Lihat Keranjang / Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addCart(item){
    cart.push(item);
    localStorage.setItem("cart", JSON.stringify(cart));
    alert(item + " ditambahkan!");
}

function goCheckout(){
    window.location.href = "checkout.html";
}
</script>

</body>
</html>
